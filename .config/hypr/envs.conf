# Extra env variables
# env = MY_GLOBAL_ENV,setting

# Route GTK/Chromium/Electron file open/save dialogs (Vivaldi, Discord clients, Steam)
# through xdg-desktop-portal instead of the native GTK chooser, so the
# termfilechooser portal (configured to use yazi) is used instead.
env = GTK_USE_PORTAL,1

# Same, but for Qt6 apps (qBittorrent, Kdenlive, Qt Designer, etc.) — routes
# their file dialogs through the portal via Qt's built-in portal theme plugin.
env = QT_QPA_PLATFORMTHEME,xdgdesktopportal
